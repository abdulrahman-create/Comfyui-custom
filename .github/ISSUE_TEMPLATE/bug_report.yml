name: Bug report
description: Something in Pixaroma is genuinely broken (after ruling out the browser-cache fix)
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        **Before filing:** if a node looks blank, broken, or is missing its controls right after an update, it is almost always a browser cache. Please try the 30-second fix first: https://github.com/pixaroma/ComfyUI-Pixaroma/issues/59
  - type: checkboxes
    id: cache-check
    attributes:
      label: Quick check
      options:
        - label: I hard-refreshed (Ctrl+Shift+R / Cmd+Shift+R) and the problem is still there
          required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What is happening?
      description: Describe the problem. Screenshots help a lot.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: What did you do right before it happened?
    validations:
      required: false
  - type: textarea
    id: versions
    attributes:
      label: Versions
      description: "Drop a Version Check Pixaroma node on the canvas, hit its Copy button, and paste here (ComfyUI version, frontend version, node interface, Pixaroma version)."
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (if a node is broken or blank)
      description: Press F12, click Console, reload the page, then paste or screenshot any red error lines.
    validations:
      required: false
